services:
  vector-db:
    image: pgvector/pgvector:pg16
    container_name: suppressor-vector-db
    environment:
      POSTGRES_USER: "${PGVECTOR_DB_USER:-vector_db_user}"
      POSTGRES_PASSWORD: "${PGVECTOR_DB_PASSWORD:-vector_db_password}"
      POSTGRES_DB: "${PGVECTOR_DB_NAME:-vector_db}"
    ports:
      - "${PGVECTOR_DB_PUBLISHED_PORT:-5433}:5432"
    volumes:
      - suppressor_vector_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_DB_USER:-vector_db_user} -d ${PGVECTOR_DB_NAME:-vector_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  suppressor_vector_db_data:
