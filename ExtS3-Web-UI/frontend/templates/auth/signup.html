<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up - Suppressor</title>
<script src="/static/vendor/tailwindcss-forms-container-queries.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#4c56af",
        surface: "#f7f9fc",
        "surface-container-low": "#f0f4f8",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#29343a",
        "on-surface-variant": "#566168",
        outline: "#717c84"
      }
    }
  }
}
</script>
<link rel="stylesheet" href="/static/css/common/nav.css">
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6" style="font-family: Inter, sans-serif;">
<main class="w-full max-w-md bg-surface-container-lowest border border-slate-200 rounded-xl shadow-xl p-8">
  <div class="flex items-center gap-3 mb-8">
    <div class="w-11 h-11 bg-primary text-white rounded-lg flex items-center justify-center">
      <span class="material-symbols-outlined">person_add</span>
    </div>
    <div>
      <h1 class="text-2xl font-black">Sign up</h1>
      <p class="text-sm text-on-surface-variant">Administrator approval is required.</p>
    </div>
  </div>

  <form id="signupForm" class="space-y-5">
    <div>
      <label class="block text-sm font-bold mb-2" for="signupId">Department</label>
      <input id="signupId" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3" minlength="3" maxlength="64" required>
    </div>
    <div>
      <label class="block text-sm font-bold mb-2" for="signupPassword">Password</label>
      <input id="signupPassword" class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3" type="password" minlength="10" maxlength="256" required>
    </div>
 
    <button class="w-full bg-primary text-white rounded-lg px-4 py-3 font-bold" type="submit">Request signup</button>
  </form>
  <p id="signupMessage" class="mt-4 text-sm text-on-surface-variant"></p>
  <a href="/login" class="block mt-6 text-sm font-bold text-primary hover:underline">Back to login</a>
</main>
<script src="/static/js/auth/signup.js"></script>
</body>
</html>
